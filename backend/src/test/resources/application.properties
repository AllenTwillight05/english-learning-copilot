spring.datasource.url=jdbc:h2:mem:english_learning_copilot_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.jwt.secret=test-only-change-me-test-only-change-me-32-bytes
app.jwt.expiration-minutes=120

app.admin.seed.enabled=false
app.admin.seed.username=admin
app.admin.seed.email=admin@example.com
app.admin.seed.password=Admin123456
app.admin.seed.display-name=Administrator

logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.test.context.support.AnnotationConfigContextLoaderUtils=ERROR
