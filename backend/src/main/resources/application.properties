spring.application.name=english-learning-copilot-backend

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/english_learning_copilot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=dev-only-change-before-production-32b
app.jwt.expiration-minutes=120

app.admin.seed.enabled=true
app.admin.seed.username=admin
app.admin.seed.email=admin@example.com
app.admin.seed.password=${APP_ADMIN_SEED_PASSWORD:Admin123456}
app.admin.seed.display-name=${APP_ADMIN_SEED_DISPLAY_NAME:Administrator}

app.speaking.upload-dir=uploads/speaking
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

xfyun.asr.enabled=${XFYUN_ASR_ENABLED:false}
xfyun.asr.base-url=${XFYUN_ASR_BASE_URL:https://office-api-ist-dx.iflyaisol.com}
xfyun.asr.app-id=${XFYUN_APP_ID:}
xfyun.asr.api-key=${XFYUN_API_KEY:}
xfyun.asr.api-secret=${XFYUN_API_SECRET:}
xfyun.asr.language=${XFYUN_ASR_LANGUAGE:autodialect}
xfyun.asr.accent=${XFYUN_ASR_ACCENT:mandarin}
xfyun.asr.result-type=${XFYUN_ASR_RESULT_TYPE:transfer}
xfyun.asr.duration-check-disable=${XFYUN_ASR_DURATION_CHECK_DISABLE:true}
xfyun.asr.poll-interval-ms=${XFYUN_ASR_POLL_INTERVAL_MS:1000}
xfyun.asr.timeout-ms=${XFYUN_ASR_TIMEOUT_MS:30000}
xfyun.asr.file-name=${XFYUN_ASR_FILE_NAME:recording.webm}
