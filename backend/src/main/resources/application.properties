spring.application.name=english-learning-copilot-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/english_learning_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-32-bytes}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:120}

app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:false}
app.admin.seed.username=${APP_ADMIN_SEED_USERNAME:admin}
app.admin.seed.email=${APP_ADMIN_SEED_EMAIL:admin@example.com}
app.admin.seed.password=${APP_ADMIN_SEED_PASSWORD:Admin123456}
app.admin.seed.display-name=${APP_ADMIN_SEED_DISPLAY_NAME:Administrator}
