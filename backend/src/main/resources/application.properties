spring.application.name=english-learning-copilot-backend

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/english_learning_copilot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=dev-only-change-before-production-32b
app.jwt.expiration-minutes=120

app.admin.seed.enabled=true
app.admin.seed.username=admin
app.admin.seed.email=admin@example.com
app.admin.seed.password=${APP_ADMIN_SEED_PASSWORD:Admin123456}
app.admin.seed.display-name=${APP_ADMIN_SEED_DISPLAY_NAME:Administrator}

app.speaking.upload-dir=uploads/speaking
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

speaking.agent.provider=${SPEAKING_AGENT_PROVIDER:sjtu}
speaking.agent.sjtu.endpoint=${SJTU_AI_ENDPOINT:https://models.sjtu.edu.cn/api/v1}
speaking.agent.sjtu.api-key=${SJTU_AI_API_KEY:}
speaking.agent.sjtu.model=${SJTU_AI_MODEL:deepseek-chat}
speaking.agent.sjtu.temperature=${SJTU_AI_TEMPERATURE:0.7}
speaking.agent.sjtu.max-tokens=${SJTU_AI_MAX_TOKENS:180}
speaking.agent.sjtu.timeout-ms=${SJTU_AI_TIMEOUT_MS:30000}
speaking.agent.sjtu.prompt-lab-dir=${SPEAKING_PROMPT_LAB_DIR:llm-prompt-lab}

xfyun.asr.enabled=${XFYUN_ASR_ENABLED:true}
xfyun.asr.base-url=${XFYUN_ASR_BASE_URL:https://office-api-ist-dx.iflyaisol.com}
xfyun.asr.app-id=${XFYUN_APP_ID:}
xfyun.asr.api-key=${XFYUN_API_KEY:}
xfyun.asr.api-secret=${XFYUN_API_SECRET:}
xfyun.asr.language=${XFYUN_ASR_LANGUAGE:autodialect}
xfyun.asr.accent=${XFYUN_ASR_ACCENT:mandarin}
xfyun.asr.result-type=${XFYUN_ASR_RESULT_TYPE:transfer}
xfyun.asr.duration-check-disable=${XFYUN_ASR_DURATION_CHECK_DISABLE:true}
xfyun.asr.poll-interval-ms=${XFYUN_ASR_POLL_INTERVAL_MS:1000}
xfyun.asr.timeout-ms=${XFYUN_ASR_TIMEOUT_MS:30000}
xfyun.asr.file-name=${XFYUN_ASR_FILE_NAME:recording.webm}
xfyun.asr.transcode-enabled=${XFYUN_ASR_TRANSCODE_ENABLED:true}
xfyun.asr.transcode-command=${XFYUN_ASR_TRANSCODE_COMMAND:ffmpeg}
xfyun.asr.transcode-timeout-ms=${XFYUN_ASR_TRANSCODE_TIMEOUT_MS:30000}

xfyun.ise.enabled=${XFYUN_ISE_ENABLED:true}
xfyun.ise.url=${XFYUN_ISE_URL:wss://ise-api.xfyun.cn/v2/open-ise}
xfyun.ise.app-id=${XFYUN_ISE_APP_ID:${XFYUN_APP_ID:}}
xfyun.ise.api-key=${XFYUN_ISE_API_KEY:${XFYUN_API_KEY:}}
xfyun.ise.api-secret=${XFYUN_ISE_API_SECRET:${XFYUN_API_SECRET:}}
xfyun.ise.language=${XFYUN_ISE_LANGUAGE:en_vip}
xfyun.ise.category=${XFYUN_ISE_CATEGORY:read_sentence}
xfyun.ise.sample-rate=${XFYUN_ISE_SAMPLE_RATE:16000}
xfyun.ise.timeout-ms=${XFYUN_ISE_TIMEOUT_MS:30000}
xfyun.ise.audio-frame-bytes=${XFYUN_ISE_AUDIO_FRAME_BYTES:1280}
xfyun.ise.transcode-enabled=${XFYUN_ISE_TRANSCODE_ENABLED:true}
xfyun.ise.transcode-command=${XFYUN_ISE_TRANSCODE_COMMAND:ffmpeg}

speaking.pronunciation.evaluate-on-turn=${SPEAKING_PRONUNCIATION_EVALUATE_ON_TURN:false}
speaking.pronunciation.evaluate-async=${SPEAKING_PRONUNCIATION_EVALUATE_ASYNC:true}

supersmart.tts.enabled=${SUPERSMART_TTS_ENABLED:true}
supersmart.tts.url=${SUPERSMART_TTS_URL:wss://cbm01.cn-huabei-1.xf-yun.com/v1/private/mcd9m97e6}
supersmart.tts.app-id=${SUPERSMART_TTS_APP_ID:${XFYUN_APP_ID:}}
supersmart.tts.api-key=${SUPERSMART_TTS_API_KEY:${XFYUN_API_KEY:}}
supersmart.tts.api-secret=${SUPERSMART_TTS_API_SECRET:${XFYUN_API_SECRET:}}
supersmart.tts.voice=${SUPERSMART_TTS_VOICE:x6_lingxiaoxuan_pro}
supersmart.tts.audio-encoding=${SUPERSMART_TTS_AUDIO_ENCODING:lame}
supersmart.tts.text-encoding=${SUPERSMART_TTS_TEXT_ENCODING:utf8}
supersmart.tts.sample-rate=${SUPERSMART_TTS_SAMPLE_RATE:24000}
supersmart.tts.speed=${SUPERSMART_TTS_SPEED:50}
supersmart.tts.pitch=${SUPERSMART_TTS_PITCH:50}
supersmart.tts.volume=${SUPERSMART_TTS_VOLUME:50}
supersmart.tts.timeout-ms=${SUPERSMART_TTS_TIMEOUT_MS:30000}
